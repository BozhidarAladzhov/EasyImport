<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Вход</title>
    <link href="/images/favicon-site.png" rel="icon" type="image/png" th:href="@{/images/favicon-site.png}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
    <link href="/css/site.css" rel="stylesheet"/>
    <link href="/css/login.css" rel="stylesheet"/>
</head>
<body class="page-login">
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
            <div class="navbar-logo-wrapper">
                <img alt="Лого" class="navbar-logo" src="/images/Logo Bozhidar Aladzhov.svg"/>
            </div>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline btn-sm" th:href="@{/}">Начало</a>
        </div>
    </div>
</nav>

<main class="login-shell">
    <div class="container">
        <div class="login-card glass">
            <div class="login-left">
                <div class="badge-chip">EasyImport</div>
                <h1>Вход</h1>
                <p class="text-muted-ux">
                    Използвай своя потребителски акаунт, за да следиш твоите автомобили,
                    документи и статуси.
                </p>

            </div>

            <div class="login-right">
                <div class="login-title">Въведи данните си</div>

                <div class="alert alert-danger mb-3" th:if="${param.error}">
                    Грешно потребителско име или парола.
                </div>
                <div class="alert alert-success mb-3" th:if="${param.logout}">
                    Успешно излязохте от профила.
                </div>

                <form class="login-form" method="post" th:action="@{/login}">
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                    <div class="mb-3">
                        <label class="form-label" for="username">Потребител</label>
                        <input autocomplete="username" class="form-control" id="username" name="username"
                               placeholder="например: admin" required type="text"/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Парола</label>
                        <input autocomplete="current-password" class="form-control" id="password" name="password"
                               placeholder="••••••••" required type="password"/>
                    </div>
                    <button class="btn w-100" type="submit">Вход</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
