<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>CarLog Users</title>
    <link href="/images/favicon-site.png" rel="icon" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
    <link href="/css/carlog.css" rel="stylesheet">
</head>
<body class="carlog-page">
<main class="carlog-shell">
    <section class="carlog-hero carlog-hero--compact">
        <div>
            <a class="back-link" href="/carlog">← Към CarLog</a>
            <div class="carlog-kicker">admin / users</div>
            <h1>Потребители</h1>
        </div>
        <div class="carlog-hero-actions">
            <a class="btn" th:href="@{/carlog/admin/users/new}">Нов потребител</a>
        </div>
    </section>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <section class="detail-panel">
        <div class="table-responsive">
            <table class="table carlog-table">
                <thead>
                <tr><th>Име</th><th>Username</th><th>Роля</th><th>Статус</th><th></th></tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.fullName}">Name</td>
                    <td th:text="${user.username}">user</td>
                    <td th:text="${user.role}">USER</td>
                    <td th:text="${user.enabled ? 'Активен' : 'Спрян'}">Активен</td>
                    <td><a class="btn btn-outline btn-sm" th:href="@{/carlog/admin/users/{id}/edit(id=${user.id})}">Редакция</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
