<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>CarLog Admin</title>
    <link href="/images/favicon-site.png" rel="icon" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
    <link href="/css/carlog.css" rel="stylesheet">
</head>
<body class="carlog-page">
<main class="carlog-shell">
    <section class="carlog-hero carlog-hero--compact">
        <div>
            <a class="back-link" href="/carlog">← Към CarLog</a>
            <div class="carlog-kicker">admin / car</div>
            <h1 th:text="${carForm.id != null ? 'Редакция на автомобил' : 'Нов автомобил'}">Нов автомобил</h1>
        </div>
    </section>

    <form class="car-form-grid" method="post"
          th:action="${carForm.id != null} ? @{/carlog/admin/cars/{id}(id=${carForm.id})} : @{/carlog/admin/cars}"
          th:object="${carForm}">
        <article class="detail-panel">
            <h3>Основни данни</h3>
            <label class="form-label">Профил</label>
            <select class="form-select" th:field="*{ownerId}">
                <option value="">Без профил</option>
                <option th:each="owner : ${owners}" th:text="${owner.fullName + ' (' + owner.username + ')'}" th:value="${owner.id}"></option>
            </select>

            <label class="form-label">Година</label>
            <input class="form-control" th:field="*{productionYear}" type="number">

            <label class="form-label">Марка</label>
            <input class="form-control" th:field="*{make}" type="text">

            <label class="form-label">Модел</label>
            <input class="form-control" th:field="*{model}" type="text">

            <label class="form-label">Гориво</label>
            <select class="form-select" th:field="*{fuelType}">
                <option th:each="fuelType : ${fuelTypes}" th:text="${fuelType.label}" th:value="${fuelType}"></option>
            </select>

            <label class="form-label">Пробег</label>
            <input class="form-control" th:field="*{mileage}" type="number">

            <label class="form-label">Регистрационен номер</label>
            <input class="form-control" th:field="*{registrationNumber}" type="text">

            <div class="form-check mt-3">
                <input class="form-check-input" th:field="*{annualTaxPaid}" type="checkbox">
                <label class="form-check-label">Данъкът е платен</label>
            </div>

            <label class="form-label mt-3">Обща бележка</label>
            <textarea class="form-control textarea" th:field="*{notesSummary}"></textarea>
        </article>

        <article class="detail-panel">
            <h3>Гражданска отговорност</h3>
            <label class="form-label">Застраховател</label>
            <input class="form-control" th:field="*{liabilityInsurer}" type="text">
            <label class="form-label">Дата на сключване</label>
            <input class="form-control" th:field="*{liabilityStartDate}" type="date">
            <label class="form-label">Валидност</label>
            <input class="form-control" th:field="*{liabilityEndDate}" type="date">
            <label class="form-label">Сума</label>
            <input class="form-control" step="0.01" th:field="*{liabilityAmount}" type="number">
            <label class="form-label">Плащане</label>
            <select class="form-select" th:field="*{liabilityPaymentPlan}">
                <option th:each="plan : ${paymentPlans}" th:text="${plan.label}" th:value="${plan}"></option>
            </select>
        </article>

        <article class="detail-panel">
            <h3>Каско</h3>
            <label class="form-label">Застраховател</label>
            <input class="form-control" th:field="*{cascoInsurer}" type="text">
            <label class="form-label">Дата на сключване</label>
            <input class="form-control" th:field="*{cascoStartDate}" type="date">
            <label class="form-label">Валидност</label>
            <input class="form-control" th:field="*{cascoEndDate}" type="date">
            <label class="form-label">Сума</label>
            <input class="form-control" step="0.01" th:field="*{cascoAmount}" type="number">
            <label class="form-label">Плащане</label>
            <select class="form-select" th:field="*{cascoPaymentPlan}">
                <option th:each="plan : ${paymentPlans}" th:text="${plan.label}" th:value="${plan}"></option>
            </select>
        </article>

        <article class="detail-panel">
            <h3>ГТП и винетка</h3>
            <label class="form-label">Дата на преглед</label>
            <input class="form-control" th:field="*{inspectionDate}" type="date">
            <label class="form-label">Преглед валиден до</label>
            <input class="form-control" th:field="*{inspectionValidUntil}" type="date">
            <label class="form-label">Винетка от</label>
            <input class="form-control" th:field="*{vignetteStartDate}" type="date">
            <label class="form-label">Винетка до</label>
            <input class="form-control" th:field="*{vignetteValidUntil}" type="date">
            <button class="btn mt-3" type="submit">Запази</button>
        </article>
    </form>
</main>
</body>
</html>
