<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>CarLog User</title>
    <link href="/images/favicon-site.png" rel="icon" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
    <link href="/css/carlog.css" rel="stylesheet">
</head>
<body class="carlog-page">
<main class="carlog-shell">
    <section class="carlog-hero carlog-hero--compact">
        <div>
            <a class="back-link" href="/carlog/admin/users">← Към потребители</a>
            <div class="carlog-kicker">admin / user</div>
            <h1 th:text="${userForm.id != null ? 'Редакция на потребител' : 'Нов потребител'}">Нов потребител</h1>
        </div>
    </section>

    <form class="user-form-panel detail-panel" method="post"
          th:action="${userForm.id != null} ? @{/carlog/admin/users/{id}(id=${userForm.id})} : @{/carlog/admin/users}"
          th:object="${userForm}">
        <label class="form-label">Име</label>
        <input class="form-control" th:field="*{fullName}" type="text">

        <label class="form-label">Username</label>
        <input class="form-control" th:field="*{username}" type="text">

        <label class="form-label">Парола</label>
        <input class="form-control" placeholder="Остави празно при редакция, ако няма промяна" th:field="*{password}" type="password">

        <label class="form-label">Роля</label>
        <select class="form-select" th:field="*{role}">
            <option th:each="role : ${roles}" th:text="${role}" th:value="${role}"></option>
        </select>

        <div class="form-check mt-3">
            <input class="form-check-input" th:field="*{enabled}" type="checkbox">
            <label class="form-check-label">Профилът е активен</label>
        </div>

        <button class="btn mt-4" type="submit">Запази</button>
    </form>
</main>
</body>
</html>
